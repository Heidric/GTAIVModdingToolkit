name: Portable Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - ".github/workflows/portable-windows.yml"
      - "GTAIVModdingToolkit.spec"
      - "packaging/**"
      - "requirements-build.txt"
      - "app.py"
      - "build_info.py"
      - "build_metadata.py"
      - "utils.py"
      - "core/**"
      - "ui/**"
      - "assets/**"
      - "tools/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt

      - name: Prepare release metadata
        id: release_info
        shell: pwsh
        run: |
          $version = python -c "from build_info import APP_VERSION; print(APP_VERSION)"
          $expectedTag = "v$version"
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"

          if ($refType -eq "tag" -and $refName -ne $expectedTag) {
            throw "Tag '$refName' does not match build_info.APP_VERSION '$version'; expected '$expectedTag'."
          }

          $channel = if ($refType -eq "tag") { "release" } else { "snapshot" }
          $buildDate = [DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
          $packageBase = "GTAIVModdingToolkit-$version-windows-x64"

          @"
          """Generated by the portable Windows workflow."""

          BUILD_COMMIT = "$env:GITHUB_SHA"
          BUILD_DATE_UTC = "$buildDate"
          BUILD_CHANNEL = "$channel"
          "@ | Set-Content -Encoding utf8 build_metadata.py

          "app_version=$version" >> $env:GITHUB_OUTPUT
          "package_base=$packageBase" >> $env:GITHUB_OUTPUT

      - name: Run regression suite
        run: python -m pytest -q

      - name: Build portable application
        run: python -m PyInstaller --clean --noconfirm GTAIVModdingToolkit.spec

      - name: Smoke-test packaged executable
        run: .\dist\GTAIVModdingToolkit\GTAIVModdingToolkit.exe --smoke-test

      - name: Run packaged system check
        run: .\dist\GTAIVModdingToolkit\GTAIVModdingToolkit.exe --doctor --packaged-only

      - name: Verify packaged version
        shell: pwsh
        run: |
          $infoPath = Join-Path $env:RUNNER_TEMP "gtaiv-toolkit-build-info.txt"
          $process = Start-Process `
            -FilePath .\dist\GTAIVModdingToolkit\GTAIVModdingToolkit.exe `
            -ArgumentList @("--write-build-info", $infoPath) `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged executable failed to write build information (exit $($process.ExitCode))."
          }
          if (-not (Test-Path $infoPath)) {
            throw "Packaged executable did not create the build-information file."
          }
          $output = Get-Content -Raw $infoPath
          if ($output -notmatch "${{ steps.release_info.outputs.app_version }}") {
            throw "Packaged executable did not report the expected application version. Output: $output"
          }

      - name: Create portable ZIP and checksum
        shell: pwsh
        env:
          PACKAGE_BASE: ${{ steps.release_info.outputs.package_base }}
        run: |
          $zipPath = ".\dist\$env:PACKAGE_BASE.zip"
          Compress-Archive -Path .\dist\GTAIVModdingToolkit\* -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          "$hash  $env:PACKAGE_BASE.zip" | Set-Content -Encoding ascii "$zipPath.sha256"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_info.outputs.package_base }}-${{ github.sha }}
          path: |
            dist/${{ steps.release_info.outputs.package_base }}.zip
            dist/${{ steps.release_info.outputs.package_base }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/${{ steps.release_info.outputs.package_base }}.zip
            dist/${{ steps.release_info.outputs.package_base }}.zip.sha256
